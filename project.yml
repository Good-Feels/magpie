name: Magpie
options:
  bundleIdPrefix: com.goodfeels
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  ClipboardEngine:
    path: ClipboardEngine
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.0.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts.git
    from: "2.0.0"

targets:
  Magpie:
    type: application
    platform: macOS
    sources:
      - path: Magpie
        excludes:
          - Magpie.entitlements
    dependencies:
      - package: ClipboardEngine
      - package: Sparkle
      - package: KeyboardShortcuts
    entitlements:
      path: Magpie/Magpie.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goodfeels.magpie
        PRODUCT_NAME: Magpie
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: Magpie/Info.plist
        CODE_SIGN_ENTITLEMENTS: Magpie/Magpie.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        DEVELOPMENT_TEAM: HTPHAYLD9X
        CODE_SIGN_STYLE: Automatic
      configs:
        debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        release:
          CODE_SIGN_IDENTITY: "Apple Development"
